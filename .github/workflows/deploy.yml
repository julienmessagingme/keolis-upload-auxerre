name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /home/ubuntu/keolis-auxerre
            git fetch origin main
            git reset --hard origin/main
            echo "✓ Code à jour : $(git log --oneline -1)"
          '

      - name: Rebuild and restart Docker container
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /home/ubuntu/keolis-auxerre
            sudo docker rm -f keolis-auxerre 2>/dev/null || true
            sudo docker-compose up -d --build
            sudo docker network connect mcp-robot_default keolis-auxerre 2>/dev/null || true
            echo "✓ Container redémarré"
            sudo docker ps --filter "name=keolis-auxerre" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          '

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            sleep 5
            sudo docker logs --tail 20 keolis-auxerre
          '
